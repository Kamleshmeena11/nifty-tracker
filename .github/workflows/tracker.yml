name: Automated Daily Nifty 1s Tracker

on:
  schedule:
    - cron: '40 3 * * 1-5'
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Python & Fyers SDK
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install fyers-apiv3

    - name: Install rclone
      run: curl https://rclone.org/install.sh | sudo bash

    - name: Create rclone config
      run: |
        # Ensure the directory exists
        mkdir -p ~/.config/rclone
        # Create config file using printf to ensure format integrity
        # The 'tr -d \r' removes hidden Windows characters that break configs
        printf "%s" "${{ secrets.RCLONE_CONFIG_DATA }}" | tr -d '\r' > ~/.config/rclone/rclone.conf
        echo "Config file created at: ~/.config/rclone/rclone.conf"

    - name: Compile and Run Tracker
      env:
        FYERS_APP_ID: ${{ secrets.FYERS_APP_ID }}
        FYERS_ACCESS_TOKEN: ${{ secrets.FYERS_ACCESS_TOKEN }}
      run: |
        # 1. Compile Java
        javac -encoding utf-8 JForexLoginTest.java
        
        # 2. Run processes in background and track PIDs
        java JForexLoginTest &
        JAVA_PID=$!
        python3 tracker.py &
        PYTHON_PID=$!
        
        # 3. Wait for processes to finish
        wait $JAVA_PID
        wait $PYTHON_PID
        echo "Data generation complete."

    - name: Upload Files to Google Drive
      run: |
        # Explicitly point to the config file path we created
        rclone copy . gdrive:NiftyData --config ~/.config/rclone/rclone.conf --progress
