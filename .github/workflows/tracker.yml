name: Automated Daily Nifty 1s Tracker

on:
  schedule:
    - cron: '40 3 * * 1-5'
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Python & Fyers SDK
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install fyers-apiv3

    - name: Install rclone
      run: curl https://rclone.org/install.sh | sudo bash

    - name: Create rclone config
      run: |
        mkdir -p /home/runner/.config/rclone
        # Create config file explicitly with the header and your secret
        printf "[gdrive]\n%s" "${{ secrets.RCLONE_CONFIG_DATA }}" > /home/runner/.config/rclone/rclone.conf
        echo "Config created at /home/runner/.config/rclone/rclone.conf"
        cat /home/runner/.config/rclone/rclone.conf

    - name: Compile and Run Tracker
      env:
        FYERS_APP_ID: ${{ secrets.FYERS_APP_ID }}
        FYERS_ACCESS_TOKEN: ${{ secrets.FYERS_ACCESS_TOKEN }}
      run: |
        javac -encoding utf-8 JForexLoginTest.java
        java JForexLoginTest &
        JAVA_PID=$!
        python3 tracker.py &
        PYTHON_PID=$!
        wait $JAVA_PID
        wait $PYTHON_PID

    - name: Upload Files to Google Drive
      run: |
        # Use the exact absolute path to the config file
        rclone copy . gdrive:NiftyData --config /home/runner/.config/rclone/rclone.conf --verbose
