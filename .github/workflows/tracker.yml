name: Automated Daily Nifty 1s Tracker

on:
  schedule:
    - cron: '40 3 * * 1-5'
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Python & Fyers SDK
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install fyers-apiv3

    - name: Install rclone
      run: curl https://rclone.org/install.sh | sudo bash

    - name: Create rclone config
      run: |
        mkdir -p ~/.config/rclone
        printf "%s" "${{ secrets.RCLONE_CONFIG_DATA }}" | tr -d '\r' > ~/.config/rclone/rclone.conf
        echo "Verifying config content:"
        cat ~/.config/rclone/rclone.conf

    - name: Compile and Run Tracker
      env:
        FYERS_APP_ID: ${{ secrets.FYERS_APP_ID }}
        FYERS_ACCESS_TOKEN: ${{ secrets.FYERS_ACCESS_TOKEN }}
      run: |
        javac -encoding utf-8 JForexLoginTest.java
        
        java JForexLoginTest &
        JAVA_PID=$!
        python3 tracker.py &
        PYTHON_PID=$!
        
        wait $JAVA_PID
        wait $PYTHON_PID
        echo "Data generation complete."

    - name: Upload Files to Google Drive
      run: |
        # Explicitly use the config file we generated in the Create step
        rclone copy . gdrive:NiftyData --config ~/.config/rclone/rclone.conf --verbose
