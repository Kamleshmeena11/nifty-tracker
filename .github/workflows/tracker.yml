name: Automated Daily Nifty 1s Tracker

on:
  schedule:
    - cron: '40 3 * * 1-5'
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          pip install fyers-apiv3

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Create rclone config
        run: |
          mkdir -p ~/.config/rclone

          printf "%s" "${{ secrets.RCLONE_CONFIG_DATA }}" | tr -d '\r' > ~/.config/rclone/rclone.conf

          echo "========== CONFIG =========="
          cat ~/.config/rclone/rclone.conf
          echo "============================"

          if grep -q "\[gdrive\]" ~/.config/rclone/rclone.conf; then
            echo "✅ gdrive section found."
          else
            echo "❌ gdrive section missing!"
            exit 1
          fi

      - name: Compile Java
        run: |
          javac -encoding UTF-8 JForexLoginTest.java

      - name: Run Java and Python
        env:
          FYERS_APP_ID: ${{ secrets.FYERS_APP_ID }}
          FYERS_ACCESS_TOKEN: ${{ secrets.FYERS_ACCESS_TOKEN }}
        run: |
          java JForexLoginTest &
          JAVA_PID=$!

          python tracker.py &
          PYTHON_PID=$!

          wait $JAVA_PID
          wait $PYTHON_PID

      - name: Final Upload
        run: |
          rclone copy live_1s_data.csv gdrive:NiftyData \
            --config ~/.config/rclone/rclone.conf \
            -v

      - name: Done
        run: echo "✅ Workflow completed successfully."
