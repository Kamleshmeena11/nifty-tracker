name: Automated Daily Nifty 1s Tracker

on:
  schedule:
    - cron: '40 3 * * 1-5'
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: windows-latest

    steps:
    - name: Fetch Code
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fyers-apiv3

    - name: Install rclone
      run: choco install rclone -y

    - name: Link Google Drive
      run: |
        @'
        ${{ secrets.RCLONE_CONFIG_DATA }}
        '@ | Set-Content -Path "rclone.conf"

    - name: Compile and Run Tracker Engine
      env:
        FYERS_APP_ID: ${{ secrets.FYERS_APP_ID }}
        FYERS_ACCESS_TOKEN: ${{ secrets.FYERS_ACCESS_TOKEN }}
      run: |
        # Compile Java
        javac -encoding utf-8 JForexLoginTest.java
        
        # Start processes and wait for them to finish
        # Using & (background) followed by Wait-Process ensures the job stays alive
        $javaProc = Start-Process java -ArgumentList "JForexLoginTest" -PassThru
        $pyProc = Start-Process python -ArgumentList "tracker.py" -PassThru
        
        Wait-Process -InputObject $javaProc, $pyProc
