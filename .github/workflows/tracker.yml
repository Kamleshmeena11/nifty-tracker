name: Automated Daily Nifty 1s Tracker

on:
  schedule:
    - cron: '40 3 * * 1-5'
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Python & Fyers SDK
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install fyers-apiv3

    - name: Install rclone
      run: curl https://rclone.org/install.sh | sudo bash

    - name: Create rclone config
      run: |
        mkdir -p ~/.config/rclone
        # Create config file with the necessary [gdrive] header and your token
        printf "%s\n%s" "[gdrive]" "${{ secrets.RCLONE_CONFIG_DATA }}" | tr -d '\r' > ~/.config/rclone/rclone.conf
        
        # Verify the section exists to prevent rclone errors
        if ! grep -q "\[gdrive\]" ~/.config/rclone/rclone.conf; then
          echo "ERROR: Missing [gdrive] section in config file!"
          exit 1
        fi
        echo "Config verified."

    - name: Compile and Run Tracker
      env:
        FYERS_APP_ID: ${{ secrets.FYERS_APP_ID }}
        FYERS_ACCESS_TOKEN: ${{ secrets.FYERS_ACCESS_TOKEN }}
      run: |
        # 1. Compile Java
        javac -encoding utf-8 JForexLoginTest.java
        
        # 2. Run processes in background and capture PIDs
        java JForexLoginTest &
        JAVA_PID=$!
        python3 tracker.py &
        PYTHON_PID=$!
        
        # 3. Wait for processes to finish
        wait $JAVA_PID
        wait $PYTHON_PID
        echo "Data generation complete."

    - name: Upload Files to Google Drive
      run: |
        # Use the exact absolute path to the config file
        rclone copy . gdrive:NiftyData --config ~/.config/rclone/rclone.conf --verbose
