name: Automated Daily Nifty 1s Tracker

on:
  schedule:
    # 03:40 UTC automatically triggers at exactly 09:10 AM IST (Monday through Friday)
    - cron: '40 3 * * 1-5'
  workflow_dispatch: # Adds a manual run button for testing

jobs:
  run-tracker:
    runs-on: windows-latest

    steps:
    - name: Fetch Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install rclone
      run: choco install rclone -y

    - name: Link Google Drive
      run: |
        New-Item -ItemType Directory -Force -Path "$HOME\.config\rclone"
        Set-Content -Path "$HOME\.config\rclone\rclone.conf" -Value "${{ secrets.RCLONE_CONFIG_DATA }}"

    - name: Install Dependencies and Live Stream
      env:
        FYERS_APP_ID: ${{ secrets.FYERS_APP_ID }}
        FYERS_ACCESS_TOKEN: ${{ secrets.FYERS_ACCESS_TOKEN }}
      run: |
        npm install fyers-api-v3
        node niftytracker.js
